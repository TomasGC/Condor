name: Security Checks (Reusable)

on:
  workflow_call:
    inputs:
      retention-days:
        description: "Security reports retention days"
        type: number
        default: 7
      head-sha:
        description: "PR head SHA for checkout in workflow_run context"
        type: string
        default: ""

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  dependency-check:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: false

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Run dependency check
        run: ./gradlew dependencyCheckAnalyze
        continue-on-error: true

      - name: Verify no critical/high vulnerabilities
        run: |
          REPORT="app/build/reports/dependency-check-report.html"

          if [ ! -f "$REPORT" ]; then
            echo "WARNING: Dependency check report not found"
            exit 0
          fi

          CRITICAL=$(grep -c 'severity="CRITICAL"' "$REPORT" 2>/dev/null || echo 0)
          HIGH=$(grep -c 'severity="HIGH"' "$REPORT" 2>/dev/null || echo 0)

          echo "Dependency Vulnerabilities:"
          echo "  Critical: $CRITICAL"
          echo "  High: $HIGH"

          if [ "$CRITICAL" -gt 0 ] || [ "$HIGH" -gt 0 ]; then
            echo "ERROR: Found critical or high severity vulnerabilities"
            echo "   Please review and update vulnerable dependencies"
            exit 1
          fi

          echo "SUCCESS: No critical/high vulnerabilities found"

      - name: Upload dependency check report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: app/build/reports/dependency-check-report.html
          retention-days: ${{ inputs.retention-days }}

      - name: Comment vulnerabilities on PR
        if: always()
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          script: |
            const fs = require('fs');
            const reportPath = 'app/build/reports/dependency-check-report.html';

            if (!fs.existsSync(reportPath)) {
              console.log('No dependency check report found');
              return;
            }

            const report = fs.readFileSync(reportPath, 'utf8');
            const criticalMatch = report.match(/Critical:\s*(\d+)/);
            const highMatch = report.match(/High:\s*(\d+)/);

            const critical = criticalMatch ? parseInt(criticalMatch[1]) : 0;
            const high = highMatch ? parseInt(highMatch[1]) : 0;

            if (critical > 0 || high > 0) {
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `## Dependency Vulnerabilities Found

                - Critical: ${critical}
                - High: ${high}

                Please review the [dependency check report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) and update vulnerable dependencies.`
              });
            }

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.head-sha != '' && inputs.head-sha || github.sha }}

      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: origin/main
          head: HEAD
          extra_args: --only-verified

  apk-size-check:
    name: APK Size Check
    runs-on: ubuntu-latest

    steps:
      - name: Find Push-CI run
        id: find-run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${{ github.head_ref }}"
          REPO="${{ github.repository }}"

          echo "Looking for latest Push-CI run on branch: $BRANCH"

          RUN=$(gh run list --repo "$REPO" --workflow=push-ci.yml --branch "$BRANCH" --limit 1 --json databaseId,conclusion --jq '.[0]')

          if [ -z "$RUN" ] || [ "$RUN" = "null" ]; then
            echo "No Push-CI run found for branch $BRANCH"
            exit 1
          fi

          RUN_ID=$(echo "$RUN" | jq -r '.databaseId')
          CONCLUSION=$(echo "$RUN" | jq -r '.conclusion')

          echo "Found Push-CI run: $RUN_ID (conclusion: $CONCLUSION)"

          if [ "$CONCLUSION" != "success" ]; then
            echo "Push-CI run did not succeed, skipping APK size check"
            exit 1
          fi

          echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT

      - uses: actions/download-artifact@v4
        with:
          name: debug-apk
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          run-id: ${{ steps.find-run.outputs.run_id }}

      - name: Check APK size
        run: |
          SIZE=$(stat -c%s app-debug.apk)
          SIZE_MB=$((SIZE / 1024 / 1024))

          echo "APK Size: ${SIZE_MB}MB"

          if [ $SIZE -gt 52428800 ]; then
            echo "WARNING: APK size (${SIZE_MB}MB) exceeds 50MB threshold"
            exit 1
          fi

          echo "SUCCESS: APK size acceptable"
