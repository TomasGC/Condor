name: Kotlin / NVD Database Refresh

on:
  workflow_call:
    inputs:
      java-version:
        type: string
        default: '21'
    secrets:
      nvd-api-key:
        required: false

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  refresh:
    name: Refresh NVD Database
    runs-on: ubuntu-latest
    # The first-ever run builds the full NVD database from scratch (no cache to restore),
    # which can take well over an hour even with an API key. 60 minutes was cancelling that
    # cold build every week before it could finish and save a cache, so every subsequent run
    # hit the same empty-cache state. Once a cache exists, updates are incremental and fast —
    # this generous ceiling only matters for that first cold build.
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ inputs.java-version }}
      - uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: false
      - uses: actions/cache/restore@v4
        with:
          path: ~/.gradle/dependency-check-data/
          key: nvd-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            nvd-${{ runner.os }}-
      - name: Update NVD database
        run: ./gradlew dependencyCheckUpdate
        env:
          NVD_API_KEY: ${{ secrets.nvd-api-key }}
      - uses: actions/cache/save@v4
        with:
          path: ~/.gradle/dependency-check-data/
          key: nvd-${{ runner.os }}-${{ github.run_id }}
