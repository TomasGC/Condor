name: Python / Lint Checks

on:
  workflow_call:
    inputs:
      python-version:
        type: string
        default: '3.12'
      scripts-dir:
        type: string
        default: 'scripts'
      pylint-fail-under:
        type: number
        default: 7

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  python-lint:
    name: Lint Checks / Python Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.scripts-dir }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
      - run: pip install flake8
      - name: Run flake8
        run: flake8 src/ tests/ --max-line-length=120 --statistics

  style-checks:
    name: Lint Checks / Style Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.scripts-dir }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
      - run: pip install black isort
      - name: Run black
        run: black --check --line-length=120 src/ tests/
      - name: Run isort
        run: isort --check --profile=black src/ tests/

  quality:
    name: Lint Checks / Quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.scripts-dir }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
      - run: pip install pylint -r requirements-test.txt
      - name: Run pylint
        run: pylint src/ tests/ --fail-under=${{ inputs.pylint-fail-under }} --disable=C0114,C0115,C0116

  type-checks:
    name: Lint Checks / Type Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.scripts-dir }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
      - run: pip install mypy
      - name: Run mypy
        run: mypy src/ --ignore-missing-imports --no-error-summary

  security:
    name: Lint Checks / Security
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.scripts-dir }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
      - run: pip install bandit
      - name: Run bandit
        run: bandit -r src/ -ll -q

  vulnerabilities:
    name: Lint Checks / Vulnerabilities
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.scripts-dir }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
      - run: pip install pip-audit
      - name: Install project dependencies
        run: pip install -r requirements-test.txt
      - name: Run pip-audit
        run: pip-audit

  dead-code:
    name: Lint Checks / Dead Code
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.scripts-dir }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
      - run: pip install vulture
      - name: Run vulture
        run: vulture src/ tests/ --min-confidence=80
