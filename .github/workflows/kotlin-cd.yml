name: Kotlin / CD - Release

on:
  workflow_call:
    inputs:
      java-version:
        type: string
        default: '21'
      app-name:
        description: "App name used for APK filename in release (e.g. 'otter')"
        type: string
        required: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  unit-tests:
    name: Unit Tests (Release)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ inputs.java-version }}
      - uses: gradle/actions/setup-gradle@v6
      - name: Run release unit tests
        run: ./gradlew testReleaseUnitTest

  build-release:
    name: Build Release APK
    needs: unit-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          [[ "$VERSION" == *-* ]] && IS_PRERELEASE=true || IS_PRERELEASE=false
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "is_prerelease=$IS_PRERELEASE" >> $GITHUB_OUTPUT
          echo "Building version $VERSION (prerelease: $IS_PRERELEASE)"

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ inputs.java-version }}

      - uses: gradle/actions/setup-gradle@v6

      - name: Build and sign release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Rename APK with version
        run: |
          mv app/build/outputs/apk/release/app-release.apk \
             app/build/outputs/apk/release/${{ inputs.app-name }}-${{ steps.version.outputs.version }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: app/build/outputs/apk/release/${{ inputs.app-name }}-${{ steps.version.outputs.version }}.apk
          generate_release_notes: true
          draft: false
          prerelease: ${{ steps.version.outputs.is_prerelease }}
          body: |
            ## Release ${{ steps.version.outputs.version }}

            ${{ steps.version.outputs.is_prerelease == 'true' && '**Type**: Pre-release (test build)' || '**Type**: Stable release' }}
            **Status**: Signed with release keystore

            ### Installation
            1. Download the APK
            2. Transfer to your Android device
            3. Open and install

            ### What's Changed
            See below for full changelog.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: release-apk-${{ steps.version.outputs.version }}
          path: app/build/outputs/apk/release/${{ inputs.app-name }}-${{ steps.version.outputs.version }}.apk
          retention-days: 90
