name: Kotlin / Integration Tests Real

on:
  workflow_call:
    inputs:
      java-version:
        type: string
        default: '21'
      python-version:
        type: string
        default: '3.12'
      pre-test-command:
        description: "Shell commands to run before tests (e.g. archive generation). Supports && chaining."
        type: string
        default: ''
      retention-days:
        type: number
        default: 7

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  real:
    name: Integration Tests / Real
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ inputs.java-version }}
      - uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: false
      - uses: actions/setup-python@v5
        if: inputs.pre-test-command != ''
        with:
          python-version: ${{ inputs.python-version }}
      - name: Pre-test setup
        if: inputs.pre-test-command != ''
        run: ${{ inputs.pre-test-command }}
      - run: ./gradlew testDebugUnitTest -DtestType=integration-real
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-real-test-results
          path: app/build/test-results/testDebugUnitTest/
          retention-days: ${{ inputs.retention-days }}
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-real-coverage-data
          path: app/build/kover/bin-reports/testDebugUnitTest.ic
          retention-days: ${{ inputs.retention-days }}
