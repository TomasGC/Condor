name: Kotlin / Build APK

on:
  workflow_call:
    inputs:
      java-version:
        type: string
        default: '21'
      apk-size-limit-mb:
        type: number
        default: 50
      retention-days:
        type: number
        default: 7

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ inputs.java-version }}
      - uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: false
      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Check APK size
        run: |
          APK="app/build/outputs/apk/debug/app-debug.apk"
          if [ ! -f "$APK" ]; then
            echo "ERROR: APK not found at $APK"
            exit 1
          fi
          SIZE_KB=$(du -k "$APK" | cut -f1)
          SIZE_MB=$((SIZE_KB / 1024))
          echo "APK size: ${SIZE_MB}MB (${SIZE_KB}KB)"
          MAX_MB=${{ inputs.apk-size-limit-mb }}
          if [ "$SIZE_MB" -ge "$MAX_MB" ]; then
            echo "ERROR: APK size ${SIZE_MB}MB exceeds limit of ${MAX_MB}MB"
            exit 1
          fi
          echo "SUCCESS: APK size within limit"

      - uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: ${{ inputs.retention-days }}
