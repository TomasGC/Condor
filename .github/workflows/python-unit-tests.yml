name: Python / Unit Tests

on:
  workflow_call:
    inputs:
      python-version:
        type: string
        default: '3.12'
      scripts-dir:
        type: string
        default: 'scripts'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  android:
    name: Unit Tests / Android
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.scripts-dir }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
      - run: pip install -r requirements-test.txt
      - run: python -m pytest tests/unit/android/ --no-cov -q

  cli:
    name: Unit Tests / CLI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.scripts-dir }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
      - run: pip install -r requirements-test.txt
      - run: python -m pytest tests/unit/cli/ --no-cov -q

  common:
    name: Unit Tests / Common
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.scripts-dir }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
      - run: pip install -r requirements-test.txt
      - run: python -m pytest tests/unit/common/ --no-cov -q
