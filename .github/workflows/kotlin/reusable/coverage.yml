name: Kotlin / Coverage

on:
  workflow_call:
    inputs:
      java-version:
        type: string
        default: '21'
      python-version:
        type: string
        default: '3.12'
      pre-test-command:
        description: "Shell commands needed to generate test data before Kover runs (e.g. archive generation). Supports && chaining."
        type: string
        default: ''
      coverage-threshold:
        type: number
        default: 80
      app-name:
        description: "App name used for coverage badge gist filename (e.g. 'otter')"
        type: string
        default: 'app'
      retention-days:
        type: number
        default: 7

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ inputs.java-version }}
      - uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: false

      - name: Download all coverage data
        uses: actions/download-artifact@v4
        with:
          pattern: "*-coverage-data"
          path: app/build/kover/bin-reports/
          merge-multiple: true
        continue-on-error: true

      - uses: actions/setup-python@v5
        if: inputs.pre-test-command != ''
        with:
          python-version: ${{ inputs.python-version }}
      - name: Pre-coverage setup
        if: inputs.pre-test-command != ''
        run: ${{ inputs.pre-test-command }}

      - name: Generate merged Kover report
        run: |
          ./gradlew koverXmlReportDebug
          ./gradlew koverHtmlReportDebug

      - name: Verify coverage threshold
        id: coverage
        run: |
          XML_REPORT="app/build/reports/kover/reportDebug.xml"
          if [ ! -f "$XML_REPORT" ]; then
            echo "ERROR: Coverage report not found at $XML_REPORT"
            exit 1
          fi
          MISSED=$(grep '<counter type="LINE"' "$XML_REPORT" | sed -n 's/.*missed="\([0-9]*\)".*/\1/p' | head -1)
          COVERED=$(grep '<counter type="LINE"' "$XML_REPORT" | sed -n 's/.*covered="\([0-9]*\)".*/\1/p' | head -1)
          TOTAL=$((MISSED + COVERED))
          if [ "$TOTAL" -eq 0 ]; then
            echo "ERROR: No coverage data (0 lines)"
            exit 1
          fi
          PERCENT=$((COVERED * 100 / TOTAL))
          echo "Coverage: ${PERCENT}% ($COVERED/$TOTAL lines)"
          echo "percentage=$PERCENT" >> $GITHUB_OUTPUT
          THRESHOLD=${{ inputs.coverage-threshold }}
          if [ "$PERCENT" -lt "$THRESHOLD" ]; then
            echo "ERROR: Coverage ${PERCENT}% below threshold ${THRESHOLD}%"
            exit 1
          fi
          echo "SUCCESS: Coverage ${PERCENT}% >= ${THRESHOLD}%"

      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: app/build/reports/kover/
          retention-days: ${{ inputs.retention-days }}

      - name: Create coverage badge
        if: always() && env.COVERAGE_GIST_ID != ''
        env:
          COVERAGE_GIST_ID: ${{ secrets.COVERAGE_GIST_ID }}
        uses: schneegans/dynamic-badges-action@e9a478b16159b4d31420099ba146cdc50f134483 # v1.7.0
        with:
          auth: ${{ secrets.GITHUB_TOKEN }}
          gistID: ${{ secrets.COVERAGE_GIST_ID }}
          filename: ${{ inputs.app-name }}-coverage.json
          label: Coverage
          message: ${{ steps.coverage.outputs.percentage }}%
          valColorRange: ${{ steps.coverage.outputs.percentage }}
          maxColorRange: 100
          minColorRange: 0
