name: Kotlin / Lint Checks

on:
  workflow_call:
    inputs:
      java-version:
        type: string
        default: '21'

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  android-lint:
    name: Lint Checks / Android Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ inputs.java-version }}
      - uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: false
      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      - run: ./gradlew lintDebug
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-reports
          path: app/build/reports/lint-results-debug.html
          retention-days: 3

  ktlint:
    name: Lint Checks / Kotlin Style
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: reviewdog/action-setup@3f401fe1d58fe77e10d665ab713057375e39b887 # v1.3.0
        with:
          reviewdog_version: v0.20.2
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ inputs.java-version }}
      - name: Run ktlint with reviewdog
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -sSLO https://github.com/pinterest/ktlint/releases/download/0.50.0/ktlint
          chmod +x ktlint
          ./ktlint --reporter=checkstyle app/src/**/*.kt | \
            reviewdog -f=checkstyle -name="ktlint" -reporter=github-pr-review \
              -filter-mode=diff_context -level=warning -fail-on-error=false || true

  detekt:
    name: Lint Checks / Kotlin Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ inputs.java-version }}
      - uses: gradle/actions/setup-gradle@v6
      - run: ./gradlew detekt
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: detekt-report
          path: app/build/reports/detekt/
          retention-days: 3

  owasp:
    name: Lint Checks / Dependencies
    runs-on: ubuntu-latest
    continue-on-error: true  # NVD outage: remove once refresh workflow bootstraps cache
    # NVD database download is throttled without NVD_API_KEY (5 req/30s)
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ inputs.java-version }}
      - uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: false
      - uses: actions/cache@v4
        with:
          path: ~/.gradle/dependency-check-data/
          key: nvd-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            nvd-${{ runner.os }}-
      - name: Run OWASP dependency check
        run: ./gradlew dependencyCheckAnalyze
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owasp-report
          path: app/build/reports/dependency-check-report.html
          retention-days: 3

  secrets-scan:
    name: Lint Checks / Secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: trufflesecurity/trufflehog@d411fff7b8879a62509f3fa98c07f247ac089a51 # v3.95.5
        with:
          path: ./
          base: main
          head: HEAD
          extra_args: --only-verified
